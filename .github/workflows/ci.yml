name: CI

# Läuft bei jedem Push und bei jedem Pull Request auf main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Build
        run: npm run build

      - name: Tests (Headless Chrome, einmalig)
        run: npm run test:ci
