name: CI

# Läuft bei jedem Push und bei jedem Pull Request auf main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Build
        run: npm run build

      - name: Tests (Headless Chrome, einmalig)
        run: npm run test:ci

      # Build-Output für den nächsten Job (deploy) zwischenspeichern
      - name: Build-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/cicd-demo/browser

  deploy:
    needs: build-and-test
    # Nur deployen, wenn der Push direkt auf main war (nicht bei reinen Pull Requests)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Build-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Per SFTP zu IONOS hochladen
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          local_path: './dist/*'
          remote_path: ${{ secrets.FTP_SERVER_DIR }}
          sftp_only: true